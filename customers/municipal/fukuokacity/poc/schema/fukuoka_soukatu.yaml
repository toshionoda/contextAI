# 福岡市 数量総括表 L2-L3-L4 階層 出力フォーマッタ
#
# 役割（2026-05-08 方針変更）:
#   このファイルは「入力スキーマ」ではなく「**出力フォーマッタ**」。
#   抽出ロジックは図面PDFから工種・規格・数量を汎用的に読み取り、
#   JS共通工種体系で正規化された中間表現を生成する。
#   このYAMLは、その中間表現を **福岡市の数量総括表フォーマット** に
#   レンダリングする際のレイアウト定義として使う。
#
# 用途:
#   - aggregate_soukatu.py が中間表現JSONをこの階層フォーマットへ集計
#   - eval が GT（福岡市総括表）との突合に使う
#   - 他自治体向けは `schema/<municipality>_soukatu.yaml` を追加するのではなく、
#     **同じ中間表現を別レンダラーに通す** 方式を取る
#
# 出典: customers/municipal/fukuokacity/0701　数量総括表｜那珂二丁目外.pdf

municipality: 福岡市
issuer: 福岡市道路下水道局 建設部 東部下水道課
construction_type: 下水道改築（管更生工が主体）
schema_version: "0.1"

工種:
  - L2: 管きょ更生工
    L2_alias: [管更生工]
    L3:
      - name: 既設管渠250mm
        L4:
          - 更生管材
          - 内面更生工:
              children: [反転・引込工, 硬化・形成工]
          - 更生付帯工:
              children:
                - 仮設備設置・撤去工
                - 本管口切断工
                - 本管口仕上工
                - 取付管口せん孔仕上工
      - name: 既設管渠300mm
        L4:
          - 更生管材
          - 内面更生工:
              children: [反転・引込工, 硬化・形成工]
          - 更生付帯工:
              children:
                - 仮設備設置・撤去工
                - 本管口切断工
                - 本管口仕上工
                - 取付管口せん孔仕上工
      - name: 換気工
        L4: [換気設備工]
      - name: 管きょ更生水替工
        L4: [揚泥車運転工, 反転・形成水替]

  - L2: 管布設工
    L2_alias: [布設替え]
    L3:
      - name: 管路土工
        L4: [掘削, 管路埋戻, 運搬・処分]
      - name: 管布設工
        L4:
          - 管布設工
          - マンホール用継手(上流用)
          - マンホール用継手(下流用)
          - 異種管継手
          - 埋設テープ
      - name: 管路路面覆工
        L4: [しま鋼板]
      - name: 管路土留工
        L4: [矢板工, 土留支保工]

  - L2: 取付管およびます工
    L3:
      - name: ます設置工
        L4: [小口径汚水桝]
      - name: 取付管布設工
        L4:
          - 取付管および支管取付工
          - やりとり継手
          - 標示テープ
      - name: 管路土工
        L4: [床掘, 管路埋戻, 運搬・処分]
      - name: 管路土留工
        L4: [矢板工, 土留支保工]

  - L2: マンホール工
    L3:
      - name: 人孔改築工
        L4:
          - 鋳鉄製マンホール蓋
          - 人孔口環
          - 足掛金物設置工
          - 転落防止梯子
          - 流動性特殊モルタル
          - インバート工
      - name: 人孔土工
        L4: [掘削, 埋戻, 運搬・処分]

  - L2: 付帯工
    L3:
      - name: 舗装撤去工
        L4:
          - 舗装版切断
          - 汚泥運搬処分
          - 舗装版破砕積込
          - インターロッキング撤去
          - 殻運搬処分
          - 掘削
          - 運搬・処分
      - name: 舗装復旧工
        L4:
          - 仮復旧工
          - 本復旧工
      - name: 区画線設置工
        L4: ["W=15cm", "実線 W=15cm換算", "文字・記号 W=15cm換算", "横断歩道 W=45cm"]
      - name: 既設構造物撤去工
        L4: [構造物とりこわし, 殻運搬・処分]
      - name: 管撤去工
        L4: [既設管撤去, 陶磁器くず運搬, 閉塞キャップ]

  - L2: 共通仮設費
    L3:
      - name: 準備費
        L4: [管内洗浄工, 本管TV調査工, 障害物撤去工]

  - L2: スクラップ費
    L3: []

# 単位の正規化辞書（Gemini Vision 出力の表記揺れを吸収）
unit_aliases:
  m: [m, ｍ, M, メートル]
  m2: [m2, ｍ2, m²]
  m3: [m3, ｍ3, m³]
  箇所: [箇所, 個所, ｶｼｮ]
  本: [本, ｾﾝ]
  個: [個, ｺ]
  組: [組, ｸﾐ]
  式: [式, ｼｷ]
  回: [回, ｶｲ]
  t: [t, ﾄﾝ, トン]

# 規格パターン（数量計算書に頻出する規格表記）
spec_patterns:
  pipe_diameter: "(T|TP|VU|HI|U)?[Pφ]?(150|200|250|300|400|500|600|800|1000|1200|1500|2000)"
  load_class: "T-(14|25)"
  manhole_size: "[第Φφ]?(600|750|900|1200|1500)\\s*(T-14|T-25)?"
  pavement_thickness: "t=([0-9]+)cm(以下|超え)?"
